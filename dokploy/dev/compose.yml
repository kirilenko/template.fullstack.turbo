name: app-dev-deploy

services:
  postgres:
    container_name: app-postgres-dev
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - internal
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: app-redis-dev
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-api:
    container_name: app-service-api-dev
    image: ${DOCKER_REGISTRY}/${DOCKER_USER}/${PROJECT_NAME}-service-api-${BRANCH}:${TAG}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - dokploy-network
    environment:
      PORT: 3001
      NODE_ENV: production
      APP_NAME: ${APP_NAME}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    labels:
      - environment=dev
      - traefik.enable=true
      - traefik.docker.network=dokploy-network

      - traefik.http.routers.service-api-dev.rule=Host(`api.dev.yourdomain.com`)
      - traefik.http.routers.service-api-dev.entrypoints=websecure
      - traefik.http.routers.service-api-dev.tls.certresolver=letsencrypt
      - traefik.http.services.service-api-dev.loadbalancer.server.port=3001

  worker:
    container_name: app-worker-dev
    image: ${DOCKER_REGISTRY}/${DOCKER_USER}/${PROJECT_NAME}-service-api-${BRANCH}:${TAG}
    pull_policy: always
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379

  web-control:
    container_name: app-web-control-dev
    image: ${DOCKER_REGISTRY}/${DOCKER_USER}/${PROJECT_NAME}-web-control-${BRANCH}:${TAG}
    pull_policy: always
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - environment=dev
      - traefik.enable=true

      - traefik.http.routers.web-control-${BRANCH}.rule=Host(`control.dev.yourdomain.com`)
      - traefik.http.routers.web-control-${BRANCH}.entrypoints=websecure
      - traefik.http.routers.web-control-${BRANCH}.tls.certResolver=letsencrypt
      - traefik.http.services.web-control-${BRANCH}.loadbalancer.server.port=80


volumes:
  pgdata:
  redisdata:

networks:
  internal:
  dokploy-network:
    external: true
