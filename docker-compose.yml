name: app

services:
  postgres:
    image: postgres:17
    ports:
      - "${PORT_POSTGRES}:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${PORT_REDIS}:6379"
    volumes:
      - redis-data:/data

volumes:
  pg-data:
  redis-data:
